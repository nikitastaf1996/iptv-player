name: Build APK

# Triggered on every push to main/master, plus manual dispatch.
# Produces a release APK signed with the debug keystore (sideloadable,
# not Play-Store-ready).
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    # Required so the auto-generated GITHUB_TOKEN can publish releases
    # via softprops/action-gh-release@v2. Without this, the token defaults
    # to read-only and the release step fails with HTTP 403.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-license: true
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.1.12297006" >> $GITHUB_ENV

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install JS deps
        run: npm install

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "✓ Generated debug.keystore"
          else
            echo "✓ debug.keystore already exists"
          fi

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build release APK
        id: buildRelease
        working-directory: android
        continue-on-error: true
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

      - name: If release failed, try debug APK
        working-directory: android
        if: steps.buildRelease.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "::warning::Release build failed; falling back to debug build"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee -a build.log

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload APK (always, if any exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0

      - name: Verify APK exists (fail the run if no APK at all)
        if: always()
        run: |
          APK=$(ls android/app/build/outputs/apk/release/*.apk android/app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK was built. Check the build-log artifact for the Gradle error."
            exit 1
          fi
          echo "✓ APK: $APK"
          ls -lh "$APK"

      - name: Print download instructions
        if: always()
        run: |
          echo "::notice::Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "::notice::Download the 'iptv-player-apk' artifact from the run page."

      # -----------------------------------------------------------------
      # Auto-publish a rolling "latest" prerelease on every push to main.
      # The release is overwritten (same tag, same asset name) so users
      # always have one stable URL to the freshest APK:
      #   https://github.com/<owner>/<repo>/releases/download/latest/iptv-player-latest.apk
      # -----------------------------------------------------------------
      - name: Stage APK for release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          APK=$(ls android/app/build/outputs/apk/release/*.apk android/app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK to publish"
            exit 1
          fi
          cp "$APK" iptv-player-latest.apk
          ls -lh iptv-player-latest.apk

      - name: Publish / update rolling 'latest' prerelease
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          body: |
            ## Latest Build

            Auto-published from the most recent push to `main`.

            - **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - **Pushed:** ${{ github.event.head_commit.timestamp }}
            - **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This release is overwritten on every push. For a stable versioned
            release, see [v1.0.0](https://github.com/${{ github.repository }}/releases/tag/v1.0.0).
          files: |
            iptv-player-latest.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
